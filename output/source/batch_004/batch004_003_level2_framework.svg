<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#f8fafc"/><rect x="60" y="60" width="960" height="120" rx="18" fill="#7c3aed"/><text x="540" y="138" text-anchor="middle" fill="#fff" font-size="46" font-weight="800" font-family="Microsoft YaHei">问题003｜框架解释（错误→修复）</text><rect x="70" y="230" width="940" height="1020" rx="22" fill="#fff" stroke="#e2e8f0" stroke-width="3"/><text x="110" y="320" fill="#0f172a" font-size="38" font-weight="800" font-family="Microsoft YaHei">错误：结尾CTA过多；修复：针对该问题只改一处核心动作。</text><text x="110" y="390" fill="#334155" font-size="30" font-family="Microsoft YaHei">框架：先指出错误信号 → 再给修复动作 → 最后给可验证指标。</text></svg>