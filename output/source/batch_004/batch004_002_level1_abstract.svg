<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#f8fafc"/><rect x="60" y="60" width="960" height="120" rx="18" fill="#1d4ed8"/><text x="540" y="138" text-anchor="middle" fill="#fff" font-size="46" font-weight="800" font-family="Microsoft YaHei">问题002｜抽象逻辑解释（只讲1个问题）</text><rect x="70" y="230" width="940" height="1020" rx="22" fill="#fff" stroke="#e2e8f0" stroke-width="3"/><text x="110" y="320" fill="#0f172a" font-size="38" font-weight="800" font-family="Microsoft YaHei">问题：中间页没有信息增量</text><text x="110" y="390" fill="#334155" font-size="30" font-family="Microsoft YaHei">为什么是问题：连续页面重复观点会降低翻页收益感，导致第2-3页流失。</text></svg>