<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111217"/>
      <stop offset="100%" stop-color="#1a1c24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg1)"/>
  <rect x="60" y="70" width="960" height="120" rx="20" fill="#e53935"/>
  <text x="540" y="145" text-anchor="middle" fill="#fff" font-size="56" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">本地商家图文获客：错误修复模板</text>

  <g filter="url(#shadow)">
    <rect x="70" y="250" width="940" height="230" rx="24" fill="#ffffff"/>
    <rect x="70" y="515" width="940" height="230" rx="24" fill="#ffffff"/>
    <rect x="70" y="780" width="940" height="230" rx="24" fill="#ffffff"/>
  </g>

  <text x="105" y="320" fill="#e53935" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">错误 01</text>
  <text x="105" y="365" fill="#222" font-size="40" font-weight="700" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">开场先讲自己，用户 3 秒看不到价值</text>
  <text x="105" y="420" fill="#2e7d32" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">修复</text>
  <text x="205" y="420" fill="#222" font-size="34" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">首屏改成“人群 + 痛点 + 结果”一句话</text>

  <text x="105" y="585" fill="#e53935" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">错误 02</text>
  <text x="105" y="630" fill="#222" font-size="40" font-weight="700" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">中间页重复口号，没有新增信息</text>
  <text x="105" y="685" fill="#2e7d32" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">修复</text>
  <text x="205" y="685" fill="#222" font-size="34" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">每页 1 个动作 + 1 条可执行标准</text>

  <text x="105" y="850" fill="#e53935" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">错误 03</text>
  <text x="105" y="895" fill="#222" font-size="40" font-weight="700" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">结尾要太多动作，转化被稀释</text>
  <text x="105" y="950" fill="#2e7d32" font-size="34" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">修复</text>
  <text x="205" y="950" fill="#222" font-size="34" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">只保留 1 个 CTA：评论“诊断”</text>

  <rect x="60" y="1260" width="960" height="110" rx="18" fill="#e53935"/>
  <text x="540" y="1330" text-anchor="middle" fill="#fff" font-size="46" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">4~5 页高密度图文结构，可直接套用</text>
</svg>
