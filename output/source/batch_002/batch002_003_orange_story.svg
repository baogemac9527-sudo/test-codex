<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <rect width="1080" height="1440" fill="#fff8f2"/>
  <rect x="0" y="0" width="1080" height="180" fill="#f57c00"/>
  <text x="540" y="120" text-anchor="middle" fill="#fff" font-size="56" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">同城门店案例拆解（故事流）</text>

  <rect x="70" y="240" width="940" height="1050" rx="28" fill="#fff" stroke="#ffe0b2" stroke-width="4"/>

  <g font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" fill="#2b2b2b">
    <text x="110" y="330" font-size="38" font-weight="800">P1 钩子：曝光高但到店低？先看这 3 个结构错误</text>
    <text x="110" y="390" font-size="34">P2 错误：首屏无场景。修复：点名“行业 + 人群 + 诉求”。</text>
    <text x="110" y="450" font-size="34">P3 错误：信息重复。修复：每页新增一个动作步骤。</text>
    <text x="110" y="510" font-size="34">P4 错误：CTA 分散。修复：只保留“评论关键词”。</text>

    <rect x="110" y="570" width="860" height="260" rx="20" fill="#fff3e0"/>
    <text x="140" y="635" font-size="34" font-weight="800" fill="#e65100">案例结果（示例口径）</text>
    <text x="140" y="690" font-size="32">- 7 天优化后，私信咨询率从 1.3% 提升到 3.1%</text>
    <text x="140" y="740" font-size="32">- 完播率提升 22%，评论关键词触发数提升 2.4 倍</text>
    <text x="140" y="790" font-size="32">- 输出 SOP：封面公式 + 分页脚本 + CTA 模板</text>

    <text x="110" y="920" font-size="34" font-weight="700">适用场景：餐饮团购、医美到店、教培咨询、家装线索。</text>
  </g>

  <rect x="70" y="1260" width="940" height="110" rx="20" fill="#f57c00"/>
  <text x="540" y="1330" text-anchor="middle" fill="#fff" font-size="44" font-weight="800" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">评论“诊断”获取同城行业模板</text>
</svg>
