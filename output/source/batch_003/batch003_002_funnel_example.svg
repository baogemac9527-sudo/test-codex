<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#f8fafc"/><text x="540" y="90" text-anchor="middle" font-size="54" font-weight="800" font-family="Microsoft YaHei" fill="#0f172a">4页图文漏斗：每页任务与流失点</text><polygon points="140,180 940,180 820,420 260,420" fill="#dbeafe"/><polygon points="260,460 820,460 730,680 350,680" fill="#bfdbfe"/><polygon points="350,720 730,720 660,930 420,930" fill="#93c5fd"/><polygon points="420,970 660,970 610,1160 470,1160" fill="#60a5fa"/><g font-family="Microsoft YaHei" fill="#111"><text x="190" y="260" font-size="34" font-weight="700">P1 封面任务：点名人群 + 痛点 + 结果</text><text x="190" y="305" font-size="28">例：教培校区“有播放没咨询”，7天提升私信率</text><text x="300" y="540" font-size="34" font-weight="700">P2 错误示例 + 修复动作</text><text x="300" y="585" font-size="28">例：首屏讲履历 → 改成家长焦虑场景</text><text x="390" y="800" font-size="34" font-weight="700">P3 可执行模板</text><text x="390" y="845" font-size="28">例：标题模板、脚本模板、CTA模板</text><text x="490" y="1045" font-size="34" font-weight="700">P4 单一CTA</text><text x="490" y="1090" font-size="28">评论关键词 + 交付物 + 24h</text></g><text x="80" y="1280" font-size="30" font-family="Microsoft YaHei" fill="#475569">流失点诊断：若P1点击低→改标题；P2停留低→加具体例子；P4转化低→收敛到单一动作。</text></svg>