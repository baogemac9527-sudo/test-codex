<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#0f172a"/><rect x="50" y="50" width="980" height="120" rx="20" fill="#ef4444"/><text x="540" y="128" text-anchor="middle" fill="#fff" font-size="52" font-weight="800" font-family="Microsoft YaHei">一个错误 + 一个修复：必须有具体例子</text><g font-family="Microsoft YaHei"><rect x="60" y="220" width="960" height="340" rx="22" fill="#fff"/><text x="90" y="280" fill="#dc2626" font-size="38" font-weight="800">错误01：封面只写“我们很专业”</text><text x="90" y="340" fill="#111" font-size="32">错误示例："10年经验，服务1000客户"（用户无感）</text><text x="90" y="395" fill="#15803d" font-size="36" font-weight="800">修复：人群+痛点+结果，一句话打中</text><text x="90" y="450" fill="#111" font-size="32">正确示例："餐饮老板团购有曝光没到店？7天把私信率从1.2%提到3%"</text><text x="90" y="505" fill="#334155" font-size="30">为什么有效：用户3秒知道“这条内容在讲我”。</text></g><g font-family="Microsoft YaHei"><rect x="60" y="590" width="960" height="340" rx="22" fill="#fff"/><text x="90" y="650" fill="#dc2626" font-size="38" font-weight="800">错误02：第2-3页重复观点，没有新信息</text><text x="90" y="710" fill="#111" font-size="32">错误示例：连续三页都写“内容要专业、要坚持”。</text><text x="90" y="765" fill="#15803d" font-size="36" font-weight="800">修复：每页1个动作 + 1条判断标准</text><text x="90" y="820" fill="#111" font-size="32">正确示例：P2给选题公式；P3给标题模板；P4给CTA句式。</text><text x="90" y="875" fill="#334155" font-size="30">为什么有效：用户每翻一页都获得“可立即照做”的新信息。</text></g><g font-family="Microsoft YaHei"><rect x="60" y="960" width="960" height="340" rx="22" fill="#fff"/><text x="90" y="1020" fill="#dc2626" font-size="38" font-weight="800">错误03：结尾同时要点赞/关注/私信/加微</text><text x="90" y="1080" fill="#111" font-size="32">错误示例：动作太多，用户决策负担高，最后不做。</text><text x="90" y="1135" fill="#15803d" font-size="36" font-weight="800">修复：只保留1个CTA + 交付物 + 时效</text><text x="90" y="1190" fill="#111" font-size="32">正确示例："评论‘诊断’，24小时发你行业4页模板"。</text><text x="90" y="1245" fill="#334155" font-size="30">为什么有效：单动作链路最短，转化率更稳定。</text></g></svg>