<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#fff7ed"/><text x="540" y="90" text-anchor="middle" font-family="Microsoft YaHei" font-size="52" font-weight="800" fill="#9a3412">案例对比：同账号改结构前后</text><rect x="70" y="150" width="440" height="1120" rx="24" fill="#fee2e2"/><rect x="570" y="150" width="440" height="1120" rx="24" fill="#dcfce7"/><text x="290" y="230" text-anchor="middle" font-size="44" font-family="Microsoft YaHei" font-weight="800" fill="#b91c1c">改前</text><text x="790" y="230" text-anchor="middle" font-size="44" font-family="Microsoft YaHei" font-weight="800" fill="#15803d">改后</text><g font-family="Microsoft YaHei" font-size="30" fill="#1f2937"><text x="100" y="310">- 封面：我们很专业</text><text x="100" y="360">- 中页：重复口号</text><text x="100" y="410">- 结尾：要5个动作</text><text x="100" y="500" font-weight="700">结果（7天）</text><text x="100" y="550">私信率 1.1%</text><text x="100" y="600">评论触发 38</text><text x="100" y="650">有效线索 12</text></g><g font-family="Microsoft YaHei" font-size="30" fill="#1f2937"><text x="600" y="310">+ 封面：人群+痛点+结果</text><text x="600" y="360">+ 中页：每页1动作1标准</text><text x="600" y="410">+ 结尾：只留评论“诊断”</text><text x="600" y="500" font-weight="700">结果（7天）</text><text x="600" y="550">私信率 3.0%</text><text x="600" y="600">评论触发 117</text><text x="600" y="650">有效线索 41</text></g><text x="540" y="1330" text-anchor="middle" font-size="34" font-family="Microsoft YaHei" fill="#334155">启发：不是“多发内容”，而是“每页角色清晰 + 信息增量清晰”。</text></svg>