<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#ecfeff"/><text x="540" y="100" text-anchor="middle" font-family="Microsoft YaHei" font-size="50" font-weight="800" fill="#155e75">可直接替换行业词的脚本卡</text><rect x="70" y="160" width="940" height="1180" rx="24" fill="#fff" stroke="#67e8f9" stroke-width="4"/><g font-family="Microsoft YaHei" fill="#0f172a"><text x="110" y="250" font-size="36" font-weight="800">[封面句]</text><text x="110" y="300" font-size="32">{行业}老板，{痛点}卡了3个月？这套4页结构给你。</text><text x="110" y="390" font-size="36" font-weight="800">[错误-修复1]</text><text x="110" y="440" font-size="30">错误：先讲自己。修复：先讲用户场景。</text><text x="110" y="485" font-size="30">例："我们服务500家" → "到店少、咨询少怎么改"</text><text x="110" y="575" font-size="36" font-weight="800">[错误-修复2]</text><text x="110" y="625" font-size="30">错误：中页重复。修复：每页1动作+1标准。</text><text x="110" y="670" font-size="30">例：P2选题公式，P3标题模板，P4行动句。</text><text x="110" y="760" font-size="36" font-weight="800">[错误-修复3]</text><text x="110" y="810" font-size="30">错误：CTA过多。修复：只保留一个动作。</text><text x="110" y="855" font-size="30">例：评论“诊断”，24小时发行业模板。</text><text x="110" y="960" font-size="36" font-weight="800">[替换变量示例]</text><text x="110" y="1010" font-size="30">行业=医美；痛点=曝光高到诊低；关键词=方案</text><text x="110" y="1060" font-size="30">行业=家装；痛点=咨询多成交低；关键词=报价</text></g></svg>