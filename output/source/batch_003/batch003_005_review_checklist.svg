<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440"><rect width="1080" height="1440" fill="#fefce8"/><text x="540" y="90" text-anchor="middle" font-family="Microsoft YaHei" font-size="52" font-weight="800" fill="#854d0e">发布前检查清单（看完就能执行）</text><rect x="70" y="150" width="940" height="1180" rx="24" fill="#fff"/><g font-family="Microsoft YaHei" fill="#1f2937"><text x="110" y="240" font-size="36" font-weight="800">□ 1. 封面是否出现“人群+痛点+结果”</text><text x="140" y="285" font-size="30">例："教培校区有播放没咨询？7天把私信率做上去"</text><text x="110" y="380" font-size="36" font-weight="800">□ 2. 每页是否新增可执行信息</text><text x="140" y="425" font-size="30">例：本页给动作，下页给标准，不重复口号。</text><text x="110" y="520" font-size="36" font-weight="800">□ 3. 是否提供了具体案例数字</text><text x="140" y="565" font-size="30">例：私信率1.2%→3.0%，线索12→41。</text><text x="110" y="660" font-size="36" font-weight="800">□ 4. 末页是否只有1个CTA</text><text x="140" y="705" font-size="30">例：评论“诊断”，领取行业模板（24h）。</text><text x="110" y="800" font-size="36" font-weight="800">□ 5. 是否有“错误写法 vs 正确写法”对照</text><text x="140" y="845" font-size="30">例："我们很专业" vs "到店少怎么改"。</text><text x="110" y="940" font-size="36" font-weight="800">□ 6. 字体/字号/行距是否可读</text><text x="140" y="985" font-size="30">建议：标题48+，正文30+，行距1.4倍。</text></g><rect x="90" y="1230" width="900" height="80" rx="14" fill="#f59e0b"/><text x="540" y="1284" text-anchor="middle" font-family="Microsoft YaHei" font-size="34" font-weight="800" fill="#fff">达成 6/6 再发布，避免“发了很多却没线索”</text></svg>