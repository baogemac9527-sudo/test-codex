<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Douyin Style Gallery</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #181c22;
        --text: #eef2f7;
        --muted: #9aa4b2;
        --primary: #4f8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 16px; color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 14px;
        border: 1px solid #263041;
      }
      .card h2 { margin: 8px 0 10px; font-size: 18px; }
      .preview {
        width: 100%;
        border-radius: 10px;
        display: block;
        border: 1px solid #2c3749;
        background: #000;
      }
      .actions { display: flex; gap: 8px; margin-top: 10px; }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 8px;
        text-decoration: none;
        color: white;
        background: var(--primary);
        font-size: 14px;
      }
      .btn.secondary { background: #2e3a4f; }
      .tip { margin-top: 18px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Douyin 图文风格预览</h1>
      <p>点击图片可查看大图；点击下载按钮可直接保存 PNG/SVG。</p>

      <div class="grid">
        <section class="card">
          <h2>Red-Black Alert</h2>
          <a href="./douyin_explosive_style_cover.png" target="_blank" rel="noopener noreferrer">
            <img class="preview" src="./douyin_explosive_style_cover.png" alt="Red-Black Alert cover" />
          </a>
          <div class="actions">
            <a class="btn" href="./douyin_explosive_style_cover.png" download>下载 PNG</a>
            <a class="btn secondary" href="./douyin_explosive_style_cover.svg" download>下载 SVG</a>
          </div>
        </section>

        <section class="card">
          <h2>Checklist Board</h2>
          <a href="./douyin_checklist_board_cover.png" target="_blank" rel="noopener noreferrer">
            <img class="preview" src="./douyin_checklist_board_cover.png" alt="Checklist Board cover" />
          </a>
          <div class="actions">
            <a class="btn" href="./douyin_checklist_board_cover.png" download>下载 PNG</a>
            <a class="btn secondary" href="./douyin_checklist_board_cover.svg" download>下载 SVG</a>
          </div>
        </section>
      </div>

      <div class="tip">本页文件位置：<code>assets/examples/gallery.html</code></div>
    </div>
  </body>
</html>
